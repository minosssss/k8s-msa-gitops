apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
            - { name: html, mountPath: /usr/share/nginx/html }
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits:   { memory: "64Mi", cpu: "100m" }
      volumes:
        - name: conf
          configMap: { name: frontend-nginx-conf }
        - name: html
          configMap: { name: frontend-html }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: default
  labels: { app: frontend }
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports:
    - { port: 80, targetPort: 80, protocol: TCP }
