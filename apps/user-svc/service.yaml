apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-svc-write
  namespace: default
  labels: { app: user-svc-write }
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-svc-write }
  template:
    metadata:
      labels: { app: user-svc-write }
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.2.0
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: user-svc-write-db-secret }
          env:
            - { name: PGRST_DB_SCHEMA, value: "public" }
            - { name: PGRST_DB_ANON_ROLE, value: "msauser" }
          readinessProbe:
    metadata:
      labels: { app: user-svc-write }
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.2.0
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: user-svc-write-db-secret }
          env:
            - { name: PGRST_DB_SCHEMA, value: "public" }
            - { name: PGRST_DB_ANON_ROLE, value: "msauser" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata:
  name: user-svc-write
  namespace: default
  labels: { app: user-svc-write }
spec:
  type: ClusterIP
  selector: { app: user-svc-write }
  ports:
    - { port: 3000, targetPort: 3000, protocol: TCP }
---
