apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-primary-init
  namespace: default
data:
  01_replication.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE ROLE ${REPLICATION_USER} WITH REPLICATION LOGIN PASSWORD '${REPLICATION_PASSWORD}';
    EOSQL

    # 단일 클러스터 Pod CIDR(172.16.0.0/16) 전체 허용 - SNAT 문제 없음
    echo "host replication ${REPLICATION_USER} 172.16.0.0/16 md5" >> "$PGDATA/pg_hba.conf"
    echo "host all all 172.16.0.0/16 md5" >> "$PGDATA/pg_hba.conf"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "SELECT pg_reload_conf();"
  02_schema.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      created_at TIMESTAMP DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      user_id INTEGER REFERENCES users(id),
      item VARCHAR(100) NOT NULL,
      status VARCHAR(20) DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT NOW()
    );
    INSERT INTO users (name) VALUES ('demo-user') ON CONFLICT DO NOTHING;
