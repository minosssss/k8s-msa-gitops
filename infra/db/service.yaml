apiVersion: v1
kind: Service
metadata:
  name: pg-write-svc
  namespace: default
  labels: { app: pg }
spec:
  type: ClusterIP
  selector: { app: pg, role: primary }
  ports:
    - { port: 5432, targetPort: 5432, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata:
  name: pg-read-svc
  namespace: default
  labels: { app: pg }
spec:
  type: ClusterIP
  selector: { app: pg, role: replica }
  ports:
    - { port: 5432, targetPort: 5432, protocol: TCP }
